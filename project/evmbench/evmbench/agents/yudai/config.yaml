yudai-default:
  start: yudai/start.sh
  instruction_file_name: INSTRUCTIONS.md
  env_vars:
    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    MODEL: claude-sonnet-4-6
    STEP_LIMIT: "50"
    COST_LIMIT: "20.0"
  gateway_sni_hosts:
    - api.anthropic.com
    - pypi.org
    - files.pythonhosted.org

